mixed-port: 7890
allow-lan: true
external-controller: :9090
ipv6: false
profile:
  store-selected: true
  # store-fake-ip: true
hosts:
  'ntp.msn.cn': '0.0.0.0'
dns:
  enable: true
  ipv6: false
  listen: :53
  # enhanced-mode: fake-ip
  enhanced-mode: redir-host 
  # fake-ip-range: 198.18.0.1/16
  use-hosts: true
  # default-nameserver:
  # - 114.114.114.114
  # - 119.29.29.29
  nameserver:
  # - 114.114.114.114
  # - 119.29.29.29
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - 127.0.0.1:9921
  - 127.0.0.1:9922
  - 127.0.0.1:15353
  - https://dns.google/dns-query
  - https://dns.twnic.tw/dns-query
  - https://cloudflare-dns.com/dns-query

  - https://dns.cloudflare.com/dns-query
  - https://public.dns.iij.jp/dns-query
  - https://jp.tiar.app/dns-query
  - https://jp.tiarap.org/dns-query
  - tls://dot.tiar.app
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
    domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.youtube.com"
    - "+.githubusercontent.com"
    - "+.googlevideo.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - msftconnecttest.com
    - msftncsi.com
tun:
  enable: false
  # stack: gvisor
  stack: system
  auto-route: true
  auto-detect-interface: true
  # dns-hijack:
  #   - 198.18.0.2:53
  #   - any:53
  #   - tcp://any:53

proxies:
  - name: geph
    type: socks5
    server: 127.0.0.1
    port: 9901
  - name: geph_default
    type: socks5
    server: 127.0.0.1
    port: 9909
  - name: geph_fallback
    type: socks5
    server: 127.0.0.1
    port: 9902

proxy-groups:
  - name: auto
    type: url-test
    proxies:
      - geph
      - geph_default
      - geph_vpn
      - geph_fallback
    url: "http://www.gstatic.com/generate_204"
    interval: 300
  - name: fallback
    type: fallback
    proxies:
      - auto
      - DIRECT
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
  - name: PROXY
    type: select
    proxies:
      - fallback
      - auto
      - geph
      - geph_default
      - geph_vpn
      - geph_fallback
      - DIRECT
  - name: Bypass
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: geph_vpn
    type: select
    interface-name: tun-geph
    proxies:
      - DIRECT

  # Rule
  - name: GoogleFCM
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: OpenAI
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: google
    type: select
    proxies:
      - PROXY
      - geph_fallback
      - DIRECT
  - name: bilibili
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: Downloader
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: ip-attribution
    type: select
    proxies:
      - DIRECT
      - PROXY
      - REJECT
  - name: Games
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: MATCH
    type: select
    proxies:
      - DIRECT
      - PROXY


rules:
# Geph
  - PROCESS-NAME,libgeph.so,DIRECT
  - PROCESS-NAME,geph4-client,DIRECT
  - PROCESS-NAME,geph4-client.exe,DIRECT
  - PROCESS-NAME,geph4-client-vpn,DIRECT
  - PROCESS-NAME,geph4-client-vpn.exe,DIRECT
  - PROCESS-NAME,geph4-client-fallback,DIRECT
  - PROCESS-NAME,geph4-client-fallback.exe,DIRECT

  - PROCESS-NAME,IDMan.exe,Downloader
  - PROCESS-NAME,qbittorrent.exe,Downloader
  - PROCESS-NAME,GenshinImpact.exe,Games
  - PROCESS-NAME,SCPSL.exe,Games
  - PROCESS-NAME,csgo.exe,Games
  
  - DOMAIN-SUFFIX,ntp.msn.cn,REJECT
  - DOMAIN-SUFFIX,translate.googleapis.com,PROXY
  - DOMAIN-SUFFIX,scpslgame.com,PROXY
  - DOMAIN-SUFFIX,tiktok.com,PROXY
  - DOMAIN-SUFFIX,metacubex.one,DIRECT
  - DOMAIN-SUFFIX,sspai.com,DIRECT
  - DOMAIN-SUFFIX,winos.me,DIRECT
  - DOMAIN-SUFFIX,kinh.cc,DIRECT
  - DOMAIN-SUFFIX,openai.com,OpenAI
  # ip-attribution
  - RULE-SET,ip-attribution,ip-attribution

  # black list
  # - RULE-SET,applications,DIRECT
  # - DOMAIN,clash.razord.top,DIRECT
  # - DOMAIN,yacd.haishan.me,DIRECT
  # - RULE-SET,private,DIRECT
  # - RULE-SET,reject,REJECT
  # - RULE-SET,tld-not-cn,PROXY
  # - RULE-SET,gfw,PROXY
  # - RULE-SET,greatfire,PROXY
  # - RULE-SET,telegramcidr,PROXY

  # while list
  - RULE-SET,applications,DIRECT
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,google,DIRECT
  - RULE-SET,proxy,PROXY
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,cncidr,DIRECT
  - RULE-SET,telegramcidr,PROXY
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT

  - MATCH,MATCH

