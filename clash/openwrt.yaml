proxies:
  - name: local_9909
    type: socks5
    server: 127.0.0.1
    port: 9909
  - name: local_9901
    type: socks5
    server: 127.0.0.1
    port: 9901
  - name: local_9902
    type: socks5
    server: 127.0.0.1
    port: 9902
  - name: local_9903
    type: socks5
    server: 127.0.0.1
    port: 9903
  - name: local_9904
    type: socks5
    server: 127.0.0.1
    port: 9904

proxy-groups:
  - name: auto
    type: fallback
    proxies:
      - local_9909
      - local_9901
      - local_9902
      - local_9903
      - local_9904
    url: "http://www.gstatic.com/generate_204"
    interval: 100
  - name: fallback
    type: fallback
    proxies:
      - auto
      - DIRECT
    url: "http://www.gstatic.cn/generate_204"
  - name: PROXY
    type: select
    proxies:
      - fallback
      - auto
      - DIRECT
      - local_9909
      - local_9901
      - local_9902
      - local_9903
      - local_9904
  - name: Bypass
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: geph_vpn
    type: select
    interface-name: tun-geph
    proxies:
      - DIRECT

  # Rule
  - name: OpenAI
    type: select
    proxies:
      - DIRECT
      - PASS
      - PROXY
  - name: GoogleFCM
    type: select
    proxies:
      - DIRECT
      - PASS
      - PROXY
  - name: bilibili
    type: select
    proxies:
      - PASS
      - DIRECT
      - PROXY
  - name: Downloader
    type: select
    proxies:
      - PASS
      - DIRECT
      - PROXY
  - name: ip-attribution
    type: select
    proxies:
      - PASS
      - PROXY
      - DIRECT
      - REJECT
  - name: Games
    type: select
    proxies:
      - PASS
      - DIRECT
      - PROXY

  # Other
  - name: MATCH
    type: select
    proxies:
      - PROXY
      - DIRECT

rules:
  # Geph
  - PROCESS-NAME,libgeph.so,DIRECT
  - PROCESS-NAME,geph4-client,DIRECT
  - PROCESS-NAME,geph4-client.exe,DIRECT

  # App
  - PROCESS-NAME,IDMan.exe,Downloader
  - PROCESS-NAME,qbittorrent.exe,Downloader
  - PROCESS-NAME,GenshinImpact.exe,Games
  - PROCESS-NAME,SCPSL.exe,Games
  - PROCESS-NAME,csgo.exe,Games
  - RULE-SET,applications,Bypass

  # Web site
  - GEOSITE,bilibili,bilibili
  - DOMAIN-SUFFIX,dockerproxy.com,Bypass
  - DOMAIN-SUFFIX,metacubex.one,Bypass
  - DOMAIN-SUFFIX,winos.me,Bypass
  - DOMAIN-SUFFIX,kinh.cc,Bypass
  - DOMAIN,yacd.haishan.me,Bypass
  - DOMAIN,clash.razord.top,Bypass
  - RULE-SET,ip-attribution,ip-attribution

  # AD
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,win-spy,REJECT
  - DOMAIN,ntp.msn.cn,REJECT

  # China CDN/Direct
  - GEOSITE,apple-cn,Bypass
  - GEOSITE,apple@cn,Bypass
  - GEOSITE,google-cn,Bypass
  - GEOSITE,google@cn,Bypass
  - GEOSITE,microsoft@cn,Bypass
  - GEOSITE,tld-cn,Bypass
  - GEOSITE,category-games@cn,Games
  - GEOSITE,googlefcm,GoogleFCM
  - GEOSITE,openai,OpenAI

  # Not China
  - GEOSITE,geolocation-!cn,PROXY

  # China
  - GEOSITE,private,Bypass
  - GEOSITE,cn,Bypass
  - GEOIP,private,Bypass
  - GEOIP,cn,Bypass

  # Other
  - MATCH,MATCH

rule-providers:
  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  ip-attribution:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/lwd-temp/anti-ip-attribution/main/generated/rule-provider.yaml"
    path: ./ruleset/ip-attribution.yaml
    interval: 86400