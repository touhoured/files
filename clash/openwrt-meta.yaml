proxies:
  - name: local_9909
    type: socks5
    server: 127.0.0.1
    port: 9909
  - name: local_9901
    type: socks5
    server: 127.0.0.1
    port: 9901
  - name: local_9902
    type: socks5
    server: 127.0.0.1
    port: 9902
  - name: local_9903
    type: socks5
    server: 127.0.0.1
    port: 9903
  - name: local_9904
    type: socks5
    server: 127.0.0.1
    port: 9904

proxy-groups:
  - name: Fallback
    type: fallback
    proxies:
      - local_9909
      - local_9901
      - local_9902
      - local_9903
      - local_9904
      - DIRECT
    url: "http://www.apple.com/library/test/success.html"
    interval: 300
  - name: PROXY
    type: select
    proxies:
      - Fallback
      - DIRECT
      - local_9909
      - local_9901
      - local_9902
      - local_9903
      - local_9904

  # Rule
  - name: OpenAI
    type: select
    proxies:
      - DIRECT
      - PASS
      - PROXY
  - name: GoogleFCM
    type: select
    proxies:
      - DIRECT
      - PASS
      - PROXY
  - name: Bilibili
    type: select
    proxies:
      - PASS
      - DIRECT
      - PROXY
  - name: Downloader
    type: select
    proxies:
      - PASS
      - DIRECT
      - PROXY
  - name: IP-Attribution
    type: select
    proxies:
      - PASS
      - PROXY
      - DIRECT
      - REJECT
  - name: Game
    type: select
    proxies:
      - PROXY
      - PASS
      - DIRECT
  - name: Game-UDP
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: MATCH
    type: select
    proxies:
      - PROXY
      - DIRECT

rules:
  # Geph
  - PROCESS-NAME,libgeph.so,DIRECT
  - PROCESS-NAME,geph4-client,DIRECT
  - PROCESS-NAME,geph4-client.exe,DIRECT

  # AD/Block
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,win-spy,REJECT
  - DOMAIN,ntp.msn.cn,REJECT
  - AND,((OR,((DOMAIN-KEYWORD,bilibili),(DOMAIN-KEYWORD,douyu))),(NETWORK,UDP)),REJECT

  # Private address
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve

  # App
  - RULE-SET,applications,DIRECT
  - PROCESS-NAME,IDMan.exe,Downloader
  - PROCESS-NAME,qbittorrent.exe,Downloader
  # - PROCESS-NAME,SCPSL.exe,Game
  # - PROCESS-NAME,csgo.exe,Game

  # Web site
  - DOMAIN-SUFFIX,dockerproxy.com,DIRECT
  - DOMAIN-SUFFIX,metacubex.one,DIRECT
  - DOMAIN-SUFFIX,winos.me,DIRECT
  - DOMAIN-SUFFIX,kinh.cc,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - DOMAIN,clash.razord.top,DIRECT

  # China CDN/Direct
  - RULE-SET,ip-attribution-reject,REJECT
  - RULE-SET,ip-attribution-direct,DIRECT
  - RULE-SET,ip-attribution-proxy,IP-Attribution
  - GEOSITE,bilibili,Bilibili
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,google-cn,DIRECT
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,tld-cn,DIRECT
  - GEOSITE,googlefcm,GoogleFCM
  - GEOSITE,openai,OpenAI
  - SUB-RULE,(PROCESS-NAME,GenshinImpact.exe),genshin
  - GEOSITE,category-games@cn,DIRECT

  # Not China
  - GEOSITE,geolocation-!cn,PROXY

  # China
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve

  # Other
  - MATCH,MATCH

sub-rules:
  genshin:
    # - IP-CIDR,8.211.128.0/18,Games,udp # Genshin Asia
    # - IP-CIDR,47.74.0.0/18,Games,udp # Genshin Asia
    - NETWORK,UDP,Game-UDP
    - DOMAIN,dispatchosglobal.yuanshen.com,PROXY # Genshin global

rule-providers:
  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  ip-attribution:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/lwd-temp/anti-ip-attribution/main/generated/rule-provider.yaml"
    path: ./ruleset/ip-attribution.yaml
    interval: 86400